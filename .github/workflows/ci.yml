name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.12.0"

# ──────────────────────────────────────────────────────────────────────────────
# Stage 1 — Install & cache
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  install-and-cache:
    name: Install (cache)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

# ──────────────────────────────────────────────────────────────────────────────
# Stage 2 — Static analysis (lint, format, typecheck)
# ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm format:check
      - run: pnpm -w lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -w typecheck

# ──────────────────────────────────────────────────────────────────────────────
# Stage 3 — Unit & integration tests
# ──────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit / Integration Tests
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -w test

# ──────────────────────────────────────────────────────────────────────────────
# Stage 4 — Build (required before e2e and Trivy)
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    timeout-minutes: 20
    env:
      VITE_API_BASE_URL: "http://localhost/api"
      VITE_SUPABASE_URL: "http://localhost:54321"
      VITE_SUPABASE_ANON_KEY: "placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -w build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# Stage 5 — E2E (Playwright)
# ──────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    env:
      VITE_API_BASE_URL: "http://localhost/api"
      VITE_SUPABASE_URL: "http://localhost:54321"
      VITE_SUPABASE_ANON_KEY: "placeholder"
      PLAYWRIGHT_BASE_URL: "http://localhost:5173"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile=false
      - uses: actions/download-artifact@v4
        with: { name: web-dist, path: apps/web/dist }

      - name: Install Playwright browsers
        run: pnpm --filter @coast-academy/web exec playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: pnpm --filter @coast-academy/web test:e2e
        continue-on-error: false

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# Stage 6 — Docker Compose validation
# ──────────────────────────────────────────────────────────────────────────────
  docker-compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config -q

# ──────────────────────────────────────────────────────────────────────────────
# Stage 7 — Security: pnpm audit + Trivy container scan
# ──────────────────────────────────────────────────────────────────────────────
  security-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    needs: install-and-cache
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: pnpm }
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm audit --prod || true

  trivy-scan:
    name: Trivy — Container Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Build web image (for scanning)
        run: |
          docker build \
            --build-arg SERVICE_NAME=web \
            -f infra/docker/Dockerfile.web \
            -t coast-academy-web:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: coast-academy-web:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # Don't fail CI on findings; just report

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

# ──────────────────────────────────────────────────────────────────────────────
# Stage 8 — SBOM generation (Syft)
# ──────────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM (Syft)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX JSON)
        run: syft dir:. --output spdx-json=sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 30
