server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico|mp4)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Supabase Auth + REST no mesmo origin (evita CSP/CORS em localhost)
  location /auth/v1/ {
    proxy_pass http://host.docker.internal:54321/auth/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:54321;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
  }

  location /rest/v1/ {
    proxy_pass http://host.docker.internal:54321/rest/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:54321;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header apikey $http_apikey;
  }

  # Porta 3000 (acesso direto ao nginx): API no mesmo origin via Traefik.
  location /api/ {
    proxy_pass http://traefik/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location / {
    try_files $uri /index.html;
  }
}
