apiVersion: 1

datasources:
  - name: Prometheus
    uid: coast-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: coast-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: coast-tempo
          urlDisplayLabel: View trace

  - name: Tempo
    uid: coast-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogs:
        datasourceUid: coast-loki
        tags: ['container']
      serviceMap:
        datasourceUid: coast-prometheus
      nodeGraph:
        enabled: true
